<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AceStudy Dashboard</title>
<!-- Tailwind CSS CDN with Forms and Container-Queries -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Custom Configuration for Neumorphism -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'slate-gray': '#2D2D35',
            'mint-green': '#00F5D4',
            'teal-accent': '#00BBF9',
          },
          boxShadow: {
            'neu-flat': '8px 8px 16px #24242a, -8px -8px 16px #363640',
            'neu-flat-sm': '4px 4px 8px #24242a, -4px -4px 8px #363640',
            'neu-inset': 'inset 6px 6px 12px #24242a, inset -6px -6px 12px #363640',
            'neu-inset-sm': 'inset 3px 3px 6px #24242a, inset -3px -3px 6px #363640',
            'neu-button': '5px 5px 10px #24242a, -5px -5px 10px #363640',
            'neu-button-pressed': 'inset 5px 5px 10px #24242a, inset -5px -5px 10px #363640',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-neumorphism">
    /* Custom styles for specific neumorphic elements that require precise shadows */
    .neu-surface {
      background: #2D2D35;
      box-shadow: 8px 8px 16px #24242a, -8px -8px 16px #363640;
    }
    .neu-inset-surface {
      background: #2D2D35;
      box-shadow: inset 6px 6px 12px #24242a, inset -6px -6px 12px #363640;
    }
    .glow-text {
      text-shadow: 0 0 8px rgba(0, 245, 212, 0.6);
    }
    body {
      background-color: #2D2D35;
      color: #E2E8F0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
  </style>
</head>

</div>
<h1 class="text-xl font-bold tracking-tight text-white">Dashboard</h1>
<button class="w-10 h-10 rounded-full neu-surface flex items-center justify-center text-mint-green hover:shadow-neu-button-pressed transition-all" data-purpose="add-button">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

<!-- BEGIN: SubjectTabBar -->

<!-- Activity Item 2 -->
<div class="flex items-center justify-between p-4 neu-surface rounded-2xl" data-purpose="activity-item">
<div class="flex items-center gap-4">

</div>

</section>

<script data-purpose="canvas-setup">
    // Sparkline Drawing Helper
    function drawSparkline(id, color, trend) {
      const canvas = document.getElementById(id);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;
      
      ctx.clearRect(0, 0, w, h);
      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.lineJoin = 'round';
      
      const step = w / (trend.length - 1);
      ctx.moveTo(0, h - (trend[0] * h));
      
      for (let i = 1; i < trend.length; i++) {
        ctx.lineTo(i * step, h - (trend[i] * h));
      }
      ctx.stroke();
    }

    // Main Chart Drawing Helper
    function drawMainChart() {
      const canvas = document.getElementById('mainProgressChart');
      if (!canvas) return;
      
      // Adjust canvas resolution for high DPI
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * 2;
      canvas.height = rect.height * 2;
      const ctx = canvas.getContext('2d');
      ctx.scale(2, 2);
      
      const w = rect.width;
      const h = rect.height;
      const points = [0.4, 0.3, 0.5, 0.45, 0.7, 0.65, 0.85, 0.8];
      
      // Create Gradient
      const gradient = ctx.createLinearGradient(0, 0, 0, h);
      gradient.addColorStop(0, 'rgba(0, 245, 212, 0.2)');
      gradient.addColorStop(1, 'rgba(0, 245, 212, 0)');
      
      ctx.beginPath();
      ctx.moveTo(0, h);
      
      const step = w / (points.length - 1);
      
      // Draw Curve
      ctx.beginPath();
      ctx.strokeStyle = '#00F5D4';
      ctx.lineWidth = 3;
      ctx.shadowBlur = 10;
      ctx.shadowColor = 'rgba(0, 245, 212, 0.5)';
      
      ctx.moveTo(0, h - (points[0] * h));
      for (let i = 1; i < points.length; i++) {
        const x = i * step;
        const y = h - (points[i] * h);
        const prevX = (i - 1) * step;
        const prevY = h - (points[i-1] * h);
        const cpX = (prevX + x) / 2;
        ctx.bezierCurveTo(cpX, prevY, cpX, y, x, y);
      }
      ctx.stroke();
      
      // Draw Area under curve
      ctx.shadowBlur = 0;
      ctx.lineTo(w, h);
      ctx.lineTo(0, h);
      ctx.fillStyle = gradient;
      ctx.fill();
    }

    // Initialize all visualizations
    window.addEventListener('load', () => {
      drawSparkline('sparkline-green', '#00F5D4', [0.2, 0.4, 0.3, 0.6, 0.5, 0.8]);
      drawSparkline('sparkline-red', '#FF5D5D', [0.8, 0.6, 0.7, 0.4, 0.5, 0.3]);
      drawMainChart();
    });

    // Handle Resize
    window.addEventListener('resize', drawMainChart);
  </script>
</body></html>
